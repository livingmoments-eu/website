name: Sync E&V Listings

on:
  schedule:
    # Daily at 07:00 UTC (09:00 München-Zeit)
    - cron: '0 7 * * *'
  workflow_dispatch:
    # Manueller Trigger: Actions → Run workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firecrawl-py

      - name: Scrape listings
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python scripts/scrape_listings.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/listings.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen - kein Commit nötig."
          else
            DATE=$(date +'%Y-%m-%d')
            git commit -m "chore: sync E&V listings $DATE [skip ci]"
            git push
          fi
